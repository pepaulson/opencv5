lessons:
  - id: 1
    title: "Lesson 1: The Threshold Matrix"
    narrative: |
      **Mission 1: Satellite De-noising**
      
      A spy satellite has captured a blurry, noisy image of a hidden facility.
      Your mission is to process this raw image using OpenCV 5 native C++ algorithms.
      
      You will convert the image from RGB to Grayscale, and then apply a Binary Threshold 
      to isolate the key structures.
    workflow_name: "LessonOneWorkflow"
    input_filename: "input.png"
    output_filename: "output.png"
    default_threshold: 127

  - id: 2
    title: "Lesson 2: The Signal and the Noise"
    narrative: |
      **Mission 2: Vision Sensor Calibration**
      
      An automated quality inspection station on an assembly line is receiving noisy image data from an industrial vision sensor. Electromagnetic interference and factory floor vibrations are causing severe artifacting on the image feed.
      
      Your mission is to use spatial filters to clean the corrupted images of machined parts so the downstream defect classification algorithms can function properly. You must balance image clarity with execution speed to maintain line throughput.
    workflow_name: "VisionCalibrationWorkflow"
    input_filename: "noisy_part.png"
    output_filename: "filtered_part.png"
    default_kernel_size: 5

  - id: 3
    title: "Lesson 3: The Borderline"
    narrative: |
      **Mission 3: Project Pathfinder**
      
      An autonomous delivery drone has lost its primary GPS navigation and must rely on its backup visual odometry system to follow roads and avoid structural hazards.
      
      Your mission is to build a multi-stage edge detection pipeline to identify distinct boundaries in the drone's camera feed. You will use Grayscale, Gaussian Blur, Sobel gradients, and Canny edge detection.
    workflow_name: "PathfinderEdgeWorkflow"
    input_filename: "drone_feed.png"
    output_filename: "l3_step4_canny.png"
    default_kernel_size: 5
    default_threshold1: 100
    default_threshold2: 200

  - id: 4
    title: "Lesson 4: The Pick-and-Place Coordinate"
    narrative: |
      **Mission 4: End-Effector Alignment**
      
      A robotic arm cell on a high-speed assembly line needs to grasp custom-machined parts as they arrive on a conveyor belt. The overhead vision sensor is capturing frames, but the robot controller needs exact $X, Y$ coordinates and the part's orientation angle to align its gripper.
      
      Your mission is to build a pipeline that takes a pre-processed image, identifies the distinct boundaries of the parts using contour algorithms, calculates their center of mass (moments), and retrieves these coordinates dynamically using Temporal Signals and Queries.
    workflow_name: "PartLocalizationWorkflow"
    input_filename: "conveyor_parts.png"
    output_filename: "conveyor_parts.png"
    default_min_area: 100

  - id: 5
    title: "Lesson 5: Part Identification & Tracking"
    narrative: |
      **Mission 5: Target Acquisition**
      
      A conveyor belt is moving mixed components. An overhead industrial vision sensor needs to identify a specific, highly detailed component (the "target") regardless of its rotation, scale, or if it is partially obscured by other parts.
      
      Your mission is to use the ORB algorithm to detect keypoints on a reference image, and match them against the live camera feed. Calculate the homography matrix to draw a bounding box around the matched object in the live feed. Temporal will gracefully handle frames where the object is occluded and retry on failures.
    workflow_name: "PartIdentificationWorkflow"
    input_filename: "ref_part.png"
    output_filename: "live_feed.png"

  - id: 6
    title: "Lesson 6: Fiducial Tracking & Camera Calibration"
    narrative: |
      **Mission 6: Spatial Awareness**
      
      Before a robot can interact with objects on a table, the vision system must remove the fisheye distortion from its wide-angle lens and establish a reliable world-coordinate origin (X=0, Y=0, Z=0) using a printed ArUco marker glued to the work surface.
      
      Your mission is to process a series of checkerboard images to generate the camera matrix and distortion coefficients. Then, detect an ArUco marker in a live feed to calculate the camera's rotational and translational vectors. Temporal will persist this calibration state even if the vision server reboots.
    workflow_name: "CalibrationServiceWorkflow"
    input_filename: "checkerboard_1.png"
    output_filename: "aruco_scene.png"
