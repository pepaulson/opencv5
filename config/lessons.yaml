lessons:
  - id: 1
    title: "Lesson 1: The Threshold Matrix"
    narrative: |
      **Mission 1: Satellite De-noising**
      
      A spy satellite has captured a blurry, noisy image of a hidden facility.
      Your mission is to process this raw image using OpenCV 5 native C++ algorithms.
      
      You will convert the image from RGB to Grayscale, and then apply a Binary Threshold 
      to isolate the key structures.
    workflow_name: "LessonOneWorkflow"
    input_filename: "input.png"
    output_filename: "output.png"
    default_threshold: 127

  - id: 2
    title: "Lesson 2: The Signal and the Noise"
    narrative: |
      **Mission 2: Vision Sensor Calibration**
      
      An automated quality inspection station on an assembly line is receiving noisy image data from an industrial vision sensor. Electromagnetic interference and factory floor vibrations are causing severe artifacting on the image feed.
      
      Your mission is to use spatial filters to clean the corrupted images of machined parts so the downstream defect classification algorithms can function properly. You must balance image clarity with execution speed to maintain line throughput.
    workflow_name: "VisionCalibrationWorkflow"
    input_filename: "noisy_part.png"
    output_filename: "filtered_part.png"
    default_kernel_size: 5

  - id: 3
    title: "Lesson 3: The Borderline"
    narrative: |
      **Mission 3: Project Pathfinder**
      
      An autonomous delivery drone has lost its primary GPS navigation and must rely on its backup visual odometry system to follow roads and avoid structural hazards.
      
      Your mission is to build a multi-stage edge detection pipeline to identify distinct boundaries in the drone's camera feed. You will use Grayscale, Gaussian Blur, Sobel gradients, and Canny edge detection.
    workflow_name: "PathfinderEdgeWorkflow"
    input_filename: "drone_feed.png"
    output_filename: "l3_step4_canny.png"
    default_kernel_size: 5
    default_threshold1: 100
    default_threshold2: 200
